<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>«Юности честное зерцало» — Словарь устаревших слов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1e3c5c 0%, #2a4a6e 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            border-bottom: 3px solid #c9a03d;
        }
        .header h1 {
            font-size: 2.2em;
            color: #f0d890;
            margin-bottom: 10px;
        }
        .header h1 span {
            color: #c9a03d;
            font-style: italic;
        }
        .header .subtitle {
            color: #b8c7d6;
            font-size: 1em;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .header p {
            color: #a0b8cc;
            font-size: 0.9em;
            margin-top: 12px;
        }
        .controls {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .sort-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .sort-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .sort-btn.active {
            background: linear-gradient(135deg, #1e3c5c, #2a4a6e);
            color: white;
        }
        .search-box {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            width: 250px;
        }
        .stats-info {
            background: linear-gradient(135deg, #e8f0f8 0%, #d0dde8 100%);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #1e3c5c;
        }
        .word-list {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .word-list h2 {
            color: #1e3c5c;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #c9a03d;
        }
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .word-card {
            background: #fafafa;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .word-card:hover {
            transform: translateY(-5px);
            border-color: #c9a03d;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .word-card.no-data { opacity: 0.6; background: #f5f5f5; }
        .word-title { font-size: 24px; font-weight: bold; color: #1e3c5c; margin-bottom: 8px; }
        .word-definition { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        .word-stats-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .stat-badge {
            flex: 1;
            background: white;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            border: 1px solid #eee;
        }
        .stat-badge .value { font-size: 14px; font-weight: bold; color: #c9a03d; }
        .stat-badge .raw { font-size: 9px; color: #aaa; margin-top: 2px; }
        .stat-badge .label { color: #999; font-size: 10px; margin-top: 3px; }
        .no-data-badge {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
        }
        .word-example {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-style: italic;
        }
        .arrow-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #ccc;
            font-size: 20px;
            transition: all 0.3s;
        }
        .word-card:hover .arrow-hint { color: #c9a03d; transform: translateX(5px); }
        .loading { text-align: center; padding: 50px; color: #666; }
        .error-message { background: #ffe0e0; color: #d32f2f; padding: 20px; border-radius: 15px; text-align: center; }
        @media (max-width: 768px) {
            .words-grid { grid-template-columns: 1fr; }
            .control-group { flex-direction: column; }
            .sort-buttons { justify-content: center; }
            .header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📖 <span>«Юности честное зерцало»</span></h1>
        <div class="subtitle">Словарь устаревших слов</div>
        <p>Анализ частотности слов в книгах Google Books (1800-2019)</p>
        <p style="font-size: 11px; margin-top: 5px;">📊 Частота = сколько раз слово встречается на 1 миллион слов в корпусе</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <div class="sort-buttons">
                <button class="sort-btn active" data-sort="alphabet">🔤 По алфавиту</button>
                <button class="sort-btn" data-sort="modern">📅 По современной частоте</button>
                <button class="sort-btn" data-sort="peak">⭐ По пиковой частоте</button>
            </div>
            <input type="text" class="search-box" placeholder="🔍 Поиск слова..." id="searchInput">
            <div class="stats-info" id="statsInfo">Загрузка...</div>
        </div>
    </div>
    <div class="word-list">
        <h2>📚 Слова из «Юности честное зерцало»</h2>
        <div class="words-grid" id="wordsGrid"><div class="loading">Загрузка данных...</div></div>
    </div>
</div>

<script src="data.js"></script>
<script>
const dictionary = {
    "блюдолиз": { def: "Подхалим, льстец, который угождает влиятельным людям ради выгоды.", example: "«Наш новый менеджер — настоящий блюдолиз»", img: "1" },
    "вретище": { def: "Очень грубая, мешковатая одежда; символ бедности или неряшливости.", example: "«В этом вретище даже на рынок идти стыдно»", img: "2" },
    "возгрей": { def: "Носовая слизь, сопли (грубое, просторечное слово).", example: "«Не люблю мелодрамы: там весь фильм разводят возгрей»", img: "3" },
    "домодержавство": { def: "Тотальная экономность в ведении дома, граничащая со скупостью.", example: "«Из-за его домодержавства мы год не покупаем фрукты»", img: "4" },
    "зерцало": { def: "Образец, наставление, то, на что следует равняться.", example: "«Эта книга стала зерцалом для молодых специалистов»", img: "5" },
    "колобродить": { def: "Беспорядочно двигаться, суетиться, вертеться на месте.", example: "«Хватит колобродить у меня за спиной!»", img: "6" },
    "лепо": { def: "Красиво, хорошо, благопристойно.", example: "«Ты прибрался в комнате — стало так лепо!»", img: "7" },
    "мзда": { def: "Плата, вознаграждение (часто с оттенком взятки или нечестного дохода).", example: "«Он потребовал свою мзду — десять тысяч сверху»", img: "8" },
    "наипаче": { def: "Особенно, более всего, в особенности.", example: "«Я люблю классическую музыку, наипаче — Баха»", img: "9" },
    "неистовство": { def: "Крайняя степень буйства, агрессии или эмоционального возбуждения.", example: "«Фанаты устроили неистовство после гола»", img: "10" },
    "обхождение": { def: "Манера поведения в обществе, вежливость, этикет.", example: "«Для работы в ресторане нужно иметь приятное обхождение»", img: "11" },
    "остроги": { def: "Сапоги или туфли с очень острыми, вытянутыми носами.", example: "«Она надела остроги, ими можно дырявить линолеум»", img: "12" },
    "отрок": { def: "Подросток, юноша (от 12 до 17 лет).", example: "«Этот отрок вместо уроков в телефоне сидит»", img: "13" },
    "переговорщик": { def: "Заговорщик, интриган, который ведёт тайные переговоры против кого-либо.", example: "«В отделе появился переговорщик»", img: "14" },
    "побратенец": { def: "Названый брат, лучший друг («братан»).", example: "«Мы с ним ещё в армии побратенцы»", img: "15" },
    "позываться": { def: "Напрашиваться на роль или задание, выпячивать себя.", example: "«Он сам позывается быть главным»", img: "16" },
    "порекать": { def: "Укорять, осуждать, попрекать кого-то.", example: "«Хватит порекать меня опозданием!»", img: "17" },
    "потчевать": { def: "Настойчиво угощать, заставлять есть или пить.", example: "«Бабушка потчевала меня пирожками»", img: "18" },
    "пременение": { def: "Изменение правил, отступление от нормы или закона.", example: "«Пришлось сделать пременение в графике»", img: "19" },
    "протори": { def: "Непредвиденные расходы, издержки, убытки.", example: "«Покупка колёс — лишние протори»", img: "20" },
    "проторжливость": { def: "Чрезмерная расточительность, привычка тратить на ненужные вещи.", example: "«Её проторжливость пугает: купила пятые часы»", img: "21" },
    "сгадить": { def: "Испортить, насорить, сделать грязно (грубое слово).", example: "«Кто сгадил на кухне?»", img: "22" },
    "сопнуть": { def: "Чавкать, хлюпать носом или причмокивать во время еды.", example: "«Не сопи за столом!»", img: "23" },
    "торжище": { def: "Шумный рынок, базар, место стихийной торговли.", example: "«На торжище такая толпа!»", img: "24" },
    "ушное": { def: "Жидкое горячее блюдо, суп (уха в широком смысле, часто шутливо).", example: "«На обед ушное из курицы»", img: "25" },
    "челядинец": { def: "Слуга, прислуга, домашний работник.", example: "«Он обращается с курьером как с челядинцем»", img: "26" },
    "червоточина": { def: "Скрытый изъян, порча, гнильца внутри чего-то внешне целого.", example: "«В проекте есть червоточина»", img: "27" },
    "чужеложство": { def: "Супружеская измена.", example: "«Пресса пишет о чужеложстве звезды»", img: "28" },
    "шляхетство": { def: "Благородное происхождение, аристократизм (часто иронично).", example: "«Своим шляхетством не хвастайся»", img: "29" },
    "экзерциция": { def: "Нудное монотонное упражнение, тренировка или зубрёжка.", example: "«Каждое утро экзерциции на гитаре»", img: "30" }
};

const WORDS_WITHOUT_DATA = ["побратенец", "проторжливость"];

let ngramData = {};
let currentSort = "alphabet";
let searchQuery = "";

function formatFreqCompact(rawFreq) {
    if (!rawFreq || rawFreq === 0) return "0";
    const val = rawFreq * 1000000;
    if (val < 0.01) return val.toExponential(2);
    if (val < 100) return val.toFixed(2);
    return Math.round(val).toString();
}

function formatRawFreq(rawFreq) {
    if (!rawFreq || rawFreq === 0) return "0";
    return rawFreq.toExponential(4);
}

function getWordStats(word, freqs, years) {
    if (WORDS_WITHOUT_DATA.includes(word)) return { hasData: false };
    if (!freqs || freqs.length === 0 || freqs.every(f => f === 0)) return { hasData: false };
    
    let maxFreq = 0, peakYear = null;
    for (let i = 0; i < freqs.length; i++) {
        if (freqs[i] > maxFreq) { maxFreq = freqs[i]; peakYear = years[i]; }
    }
    let modernSum = 0, modernCount = 0;
    for (let i = 0; i < years.length; i++) {
        if (years[i] >= 2000) { modernSum += freqs[i]; modernCount++; }
    }
    return { hasData: true, peakYear, peakFreq: maxFreq, modernFreq: modernCount ? modernSum / modernCount : 0 };
}

function convertData() {
    for (const [word, yearsData] of Object.entries(NGRAM_DATA)) {
        ngramData[word] = { years: [], frequencies: [] };
        const sortedYears = Object.keys(yearsData).sort((a,b) => a - b);
        for (const year of sortedYears) {
            ngramData[word].years.push(parseInt(year));
            ngramData[word].frequencies.push(yearsData[year]);
        }
    }
}

function renderGrid() {
    const grid = document.getElementById('wordsGrid');
    let words = Object.keys(dictionary);
    const stats = {};
    for (const w of words) {
        const d = ngramData[w];
        stats[w] = getWordStats(w, d?.frequencies, d?.years);
    }
    
    words.sort((a,b) => {
        if (currentSort === 'alphabet') return a.localeCompare(b);
        if (currentSort === 'modern') return (stats[b].modernFreq || -1) - (stats[a].modernFreq || -1);
        if (currentSort === 'peak') return (stats[b].peakFreq || -1) - (stats[a].peakFreq || -1);
        return 0;
    });
    
    if (searchQuery) words = words.filter(w => w.toLowerCase().includes(searchQuery.toLowerCase()));
    
    const withData = words.filter(w => stats[w].hasData).length;
    document.getElementById('statsInfo').innerHTML = `📊 ${withData}/${words.length} слов с данными`;
    
    grid.innerHTML = '';
    for (const w of words) {
        const info = dictionary[w];
        const s = stats[w];
        const has = s.hasData;
        const card = document.createElement('div');
        card.className = `word-card ${!has ? 'no-data' : ''}`;
        card.onclick = () => location.href = `word.html?word=${encodeURIComponent(w)}&smoothing=3`;
        card.innerHTML = `
            <div class="word-title">${w}</div>
            <div class="word-definition">${info.def}</div>
            ${has ? `
            <div class="word-stats-row">
                <div class="stat-badge"><div class="value">${s.peakYear || '—'}</div><div class="label">Пиковый год</div></div>
                <div class="stat-badge"><div class="value">${formatFreqCompact(s.peakFreq)}</div><div class="raw">(частота: ${formatRawFreq(s.peakFreq)})</div><div class="label">Пиковая частота</div></div>
                <div class="stat-badge"><div class="value">${formatFreqCompact(s.modernFreq)}</div><div class="raw">(частота: ${formatRawFreq(s.modernFreq)})</div><div class="label">Совр. частота</div></div>
            </div>
            ` : `<div class="no-data-badge">⚠️ СЛОВО ОТСУТСТВУЕТ В КОРПУСЕ</div>`}
            <div class="word-example">📖 ${info.example}</div>
            <div class="arrow-hint">→</div>
        `;
        grid.appendChild(card);
    }
}

document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        renderGrid();
    };
});
document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; renderGrid(); };

convertData();
renderGrid();
</script>
</body>
</html>
